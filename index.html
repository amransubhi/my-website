<script>
  // Generate 3D Stars
  const field = document.getElementById('star-field');
  for (let i = 0; i < 100; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    const size = Math.random() * 3 + 'px';
    star.style.width = size;
    star.style.height = size;
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
    star.style.animationDelay = Math.random() * 5 + 's';
    field.appendChild(star);
  }

  // Language Logic
  const dict = {
    ku: { header_title: "فرۆشگەها ئەلکترۆنی", auto_t: "Autodesk All Apps", ap: "15,000 IQD" },
    ar: { header_title: "المتجر الإلكتروني", auto_t: "باقة أوتوديسك", ap: "15,000 د.ع" },
    en: { header_title: "Digital Store", auto_t: "Autodesk Apps", ap: "15,000 IQD" }
  };

  function changeLang(val) {
    const root = document.getElementById('pro-3d-root');
    root.setAttribute('dir', val === 'en' ? 'ltr' : 'rtl');
    document.querySelectorAll('[data-k]').forEach(el => {
      const k = el.getAttribute('data-k');
      if(dict[val][k]) el.innerText = dict[val][k];
    });
  }
</script>
