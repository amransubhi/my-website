<style>
  @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap');

  /* --- VARIABLES --- */
  :root {
    --bg-color: #f0f2f5;
    --card-bg: rgba(255, 255, 255, 0.8);
    --text-color: #1e293b;
    --header-bg: rgba(255, 255, 255, 0.5);

  .dark-theme {
    --bg-color: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.7);
    --text-color: #f8fafc;
    --header-bg: rgba(15, 23, 42, 0.6);
    --star-color: #ffffff;

  #pro-3d-root {
    all: initial;
    display: block;
    width: 100%;
    min-height: 100vh;
    font-family: 'Tajawal', sans-serif;
    background: var(--bg-color) !important;
    color: var(--text-color) !important;
    transition: background 0.5s ease;
    position: relative;
    overflow-x: hidden;
    direction: rtl;
  }

  /* --- NEW STAR ANIMATION --- */
  .bg-animation {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    background: var(--star-color);
    border-radius: 50%;
    opacity: 0.5;
    animation: floatStars var(--duration) ease-in-out infinite;
  }

  @keyframes floatStars {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
    50% { transform: translateY(-100px) scale(1.5); opacity: 0.7; }
  }

  /* --- DARK/LIGHT TOGGLE --- */
  .theme-toggle {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 100;
    cursor: pointer;
    background: var(--header-bg);
    border: 1px solid rgba(255,255,255,0.2);
    padding: 10px;
    border-radius: 50%;
    width: 45px; height: 45px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    backdrop-filter: blur(10px);
  }

  /* --- UI CONTENT --- */
  .pro-header {

    backdrop-filter: blur(15px);
    padding: 50px 20px;

  }

  .pro-title { font-size: 28px; font-weight: 900; color: #3b82f6 !important; }

  .card-container { display: flex; justify-content: center; padding: 60px 20px; perspective: 1000px; z-index: 1; position: relative; }

  .card-3d {

    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 30px;
    border: 1px solid rgba(255,255,255,0.1);
    transform-style: preserve-3d;
    transition: 0.5s;
    box-shadow: 0 20px 40px rgba(0,0,0,0.2);
  }

  .card-3d:hover { transform: translateY(-10px) rotateX(5deg); }

  .img-wrapper { margin-top: -80px; display: flex; justify-content: center; transform: translateZ(50px); }
  .pro-img { width: 180px; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.3)); }

<script>
  // Stars Generation
  const field = document.getElementById('star-field');
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.width = star.style.height = Math.random() * 4 + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.setProperty('--duration', Math.random() * 5 + 3 + 's');
    field.appendChild(star);
  }

  // Theme Toggle
  function toggleTheme() {
    const root = document.getElementById('pro-3d-root');
    const icon = document.getElementById('theme-icon');
    if (root.classList.contains('dark-theme')) {
      root.classList.remove('dark-theme');
      icon.innerText = '☀️';
    } else {
      root.classList.add('dark-theme');
      icon.innerText = '🌙';
    }
  }
</script>
