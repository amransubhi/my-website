    <title>Software Store - Contact</title>
    <style>
        /* CSS Styling */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f172a; /* رەنگێ پشت بنەما یێ تاریک */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            display: flex;
            gap: 50px;
            perspective: 1000px; /* بو پەیداکرنا هەستا 3D */
        }

        .card {
            width: 120px;
            height: 120px;
            background: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            transition: transform 0.5s, box-shadow 0.5s;
            transform-style: preserve-3d;
            text-decoration: none;
        }

        /* 3D Animation Effects */
        .card:hover {
            transform: rotateY(20deg) rotateX(10deg) translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -5px;
            border-radius: 25px;
            background: linear-gradient(45deg, #3b82f6, #06b6d4, #3b82f6);
            z-index: -1;
            opacity: 0;
            transition: 0.5s;
        }

        .card:hover::before {
            opacity: 1;
            filter: blur(15px);
        }

        .card svg {
            width: 60px;
            height: 60px;
            fill: white;
            transition: transform 0.5s;
        }

        .card:hover svg {
            transform: translateZ(50px); /* وێنا بەرەف پێش دئینیت */
        }

        /* رەنگێن تایبەت بۆ هەر ئەپەکێ */
        .instagram:hover { border: 1px solid #e1306c; }
        .telegram:hover { border: 1px solid #0088cc; }
        .whatsapp:hover { border: 1px solid #25d366; }

        .label {
            position: absolute;
            bottom: -35px;
            color: white;
            font-weight: bold;
            font-size: 14px;
            opacity: 0;
            transition: 0.5s;
        }

        .card:hover .label {
            opacity: 1;
            bottom: -45px;
        }
    </style>
</head>
